<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Polaroid Arcade</title>
<meta name="theme-color" content="#13d6bf" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icons/icon-192.svg" sizes="192x192" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icons/icon-192.svg" />
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app" aria-label="Cabina Polaroid">
    <header class="topbar">
      <div class="brand">Polaroid Arcade</div>
      <div id="arcadeState" class="statusPill" data-tone="idle">BOOTING</div>
    </header>

    <section id="cameraArea" class="cameraShell">
      <video id="video" playsinline autoplay></video>
      <div class="frameOverlay" aria-hidden="true"></div>
      <div id="printTarget" class="printTarget" aria-hidden="true">
        <span>Zona de impresion</span>
      </div>
      <div id="flashFx" aria-hidden="true"></div>
    </section>

    <section class="controls">
      <button id="takePhoto" disabled>Tomar Foto</button>
      <button id="toggleCamera" class="camera-toggle">📷 Cambiar Cámara</button>
      <button id="openImageConfig" class="configButton">Configuracion de imagen</button>
      <button id="installAppBtn" class="installButton hiddenInstall">Instalar app</button>
      <div id="installStatus" class="installStatus" aria-live="polite"></div>
      <div class="row">
        <button id="btnConnect" class="primary">Conectar Impresora</button>
        <button id="btnDisconnect" class="secondary" disabled>Desconectar</button>
      </div>

      <button id="startCam" class="hiddenControl" aria-hidden="true" tabindex="-1">Abrir cámara</button>
      <button id="stopCam" class="hiddenControl" aria-hidden="true" tabindex="-1">Detener cámara</button>
    </section>

    <section class="statusCard" aria-live="polite">
      <div>Estado del sistema</div>
      <div id="status">Inicializando cámara...</div>
    </section>

    <canvas id="canvas" width="384" height="256"></canvas>
    <div id="log" class="log" role="log" aria-live="polite"></div>
  </main>

  <div id="imageConfigModal" class="modalOverlay" aria-hidden="true">
    <section class="modalCard" role="dialog" aria-modal="true" aria-labelledby="configTitle">
      <header class="modalHeader">
        <h2 id="configTitle">Configuracion de imagen</h2>
      </header>

      <div class="modalBody">
        <label class="field">
          <span>Preset</span>
          <select id="cfgPreset">
            <option value="custom">Personalizado</option>
            <option value="texto">Texto</option>
            <option value="logo">Logo</option>
            <option value="foto">Foto</option>
            <option value="qr">QR</option>
          </select>
        </label>

        <label class="field">
          <span>Modo de conversion</span>
          <select id="cfgMode">
            <option value="threshold">threshold</option>
            <option value="adaptive">adaptive</option>
            <option value="dithering">dithering</option>
          </select>
        </label>

        <label class="field">
          <span>Umbral: <strong id="cfgThresholdValue">127</strong></span>
          <input id="cfgThreshold" type="range" min="0" max="255" value="127" />
        </label>

        <label id="cfgDitheringField" class="field">
          <span>Tipo de dithering</span>
          <select id="cfgDithering">
            <option value="floyd-steinberg">floyd-steinberg</option>
            <option value="atkinson">atkinson</option>
            <option value="bayer">bayer</option>
          </select>
        </label>

        <label class="field">
          <span>Brillo: <strong id="cfgBrightnessValue">0</strong></span>
          <input id="cfgBrightness" type="range" min="-100" max="100" value="0" />
        </label>

        <label class="field">
          <span>Contraste: <strong id="cfgContrastValue">1.0</strong></span>
          <input id="cfgContrast" type="range" min="0.5" max="2" step="0.1" value="1" />
        </label>

        <label class="field">
          <span>Gamma: <strong id="cfgGammaValue">1.0</strong></span>
          <input id="cfgGamma" type="range" min="0.5" max="3" step="0.1" value="1" />
        </label>

        <label class="field">
          <span>Reduccion de ruido</span>
          <select id="cfgNoiseReduction">
            <option value="off">off</option>
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
          </select>
        </label>

        <label class="field checkboxField">
          <input id="cfgInvert" type="checkbox" />
          <span>Invertir colores</span>
        </label>

        <label class="field">
          <span>Escalado</span>
          <select id="cfgResize">
            <option value="fit_width">fit_width</option>
            <option value="keep_size">keep_size</option>
          </select>
        </label>

        <div class="previewBox">
          <div class="previewTitle">Preview</div>
          <canvas id="configPreviewCanvas" width="300" height="200"></canvas>
        </div>
      </div>

      <footer class="modalFooter">
        <button id="cfgCancel" class="secondaryBtn">Cancelar</button>
        <button id="cfgClose" class="ghostBtn">Cerrar</button>
        <button id="cfgApply" class="primaryBtn">Aplicar</button>
      </footer>
    </section>
  </div>

  <script>
    const arcadeStateEl = document.getElementById('arcadeState');
    const btnDisconnectEl = document.getElementById('btnDisconnect');

    function setArcadeState(label, tone) {
      if (!arcadeStateEl) return;
      arcadeStateEl.textContent = label;
      arcadeStateEl.dataset.tone = tone;
    }

    window.addEventListener('printer-state', (ev) => {
      const st = ev.detail && ev.detail.state ? ev.detail.state : 'idle';
      if (st === 'connected') setArcadeState('READY', 'ready');
      else if (st === 'pairing') setArcadeState('PAIRING...', 'pairing');
      else if (st === 'error') setArcadeState('ERROR', 'error');
      else if (st === 'disconnected') setArcadeState('NO PRINTER', 'idle');
      else if (!btnDisconnectEl.disabled) setArcadeState('READY', 'ready');
    });

    window.addEventListener('camera-status', (ev) => {
      const txt = String(ev.detail || '').toLowerCase();
      if (txt.includes('procesando') || txt.includes('imprimiendo')) {
        document.body.classList.add('printingPulse');
      } else {
        document.body.classList.remove('printingPulse');
      }
    });
  </script>
<script src="./impresora.js"></script>
<script src="./image-config.js"></script>
<script src="./camara.js"></script>
<script src="./pwa.js"></script>
<script src="./dist/receipt-printer-encoder.umd.js"></script>
<script>
  initImpresora();
  initCameraUploader();
</script>
</body>
</html>
