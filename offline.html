<!doctype html>
<html lang="es">

  <title>Sin conexion</title>

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;

      font-family: "Chakra Petch", "Rajdhani", sans-serif;

    p { margin: 0; color: #b6c0e5; }
